project: example_cleavage
protein:
  name: proteolysis_fragment
  sequence: "MASGKRPTQSYFMKQG"
  ptm:
    mode: explicit
    include_wt: true
    sites:
      - position: 10
        residue: S
        ptm: pSer
  cleavage_sets:
    - name: trypsin_digest
      mode: protease
      protease: trypsin_simple
      missed_cleavages: 1
      cleavage_probability: 1.0
      min_fragment_length: 2
      preserve_ptm_mapping: true
      include_intact: true
      individual_fragments: true
      fragment_mixture: true
    - name: sequential_trypsin
      mode: sequential
      protease: trypsin_simple
      n_cuts: 2
      order: n_to_c
      min_fragment_length: 2
      preserve_ptm_mapping: true
      include_intact: false
      individual_fragments: false
      fragment_mixture: true
calvados:
  installation: null
  model: pCALVADOS2
  residue_parameters: null
  temperature_k: 293.0
  ph: 7.4
  simulation:
    integrator: calvados_default
    dt_ps: 0.01
    save_every_steps: 7000
    n_frames: 1010
    runtime_hours: 0
    platform: CPU
runner:
  backend: local
  work_dir: runs/example_cleavage
  dry_run: true
analysis:
  observables:
    - rg
    - ree
    - contacts
    - ps
    - scaling
    - lifetime
    - msd
