project: example_single_idr
sequence:
  name: ash1_idr_fragment
  sequence: "MASNDYTQQATQSYGAYPTQPGQGYSQQSSQPPQ"
ptm:
  mode: wt
  include_wt: true
calvados:
  installation: null
  model: CALVADOS2
  # Or set IDRPTM_CALVADOS_RESIDUES / CALVADOS_RESIDUES_CSV.
  residue_parameters: null
  temperature_k: 293.0
  ph: 7.4
  simulation:
    integrator: calvados_default
    dt_ps: 0.01
    save_every_steps: 7000
    n_frames: 1010
    runtime_hours: 0
    platform: CPU
runner:
  backend: local
  work_dir: runs/example_single_idr
  dry_run: true
analysis:
  observables:
    - rg
    - ree
    - contacts
    - ps
    - scaling
    - lifetime
    - msd
